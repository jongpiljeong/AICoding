defaults: base.yaml

model:
  backbone: "vit-l-14"
  clip_pretrained: "laion2b_s32b_b82k"

clip:
  fuse_layer_start: 14           # deeper start for larger ViT-L/14
  input_short_side: 336
  patch_size: 14
  use_sliding_window: false

diffusion:
  sd_timestep: 45

segmentor:
  use_fgc: true
  fgc_alpha: 0.4
  temperature: 0.07
  bg_threshold: 0.45

dataset:
  name: "ade20k"
  root: "data/ADEChallengeData2016"
  split: "validation"
  category_file: "configs/categories/ade20k_847.txt"
