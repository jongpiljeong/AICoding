defaults: base.yaml

model:
  backbone: "vit-b-16"
  clip_pretrained: "laion2b_s34b_b88k"

clip:
  fuse_layer_start: 6
  input_short_side: 336
  use_sliding_window: false

diffusion:
  sd_timestep: 45

segmentor:
  use_fgc: true
  fgc_alpha: 0.4
  temperature: 0.07
  bg_threshold: 0.45

dataset:
  name: "ade20k"
  root: "data/ADEChallengeData2016"
  split: "validation"
  category_file: "configs/categories/ade20k_847.txt"
